<body class="bg-background text-on-surface min-h-screen flex flex-col">

</div>
<!-- Restaurant Name -->

</div>
<!-- Visit Status & Rating -->
<div class="grid grid-cols-2 gap-gutter">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block">访问状态</label>
<div class="flex bg-surface-container-low p-1 rounded-lg border border-surface-variant">
<button class="flex-1 py-2 font-label-md text-label-md rounded bg-primary text-on-primary shadow-sm" id="btnVisited" type="button">已就餐</button>
<button class="flex-1 py-2 font-label-md text-label-md rounded text-on-surface-variant" id="btnWishlist" type="button">心愿单</button>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block">星级评分</label>
<div class="flex items-center h-[42px] gap-1" id="starRating">
<span class="material-symbols-outlined text-primary cursor-pointer transition-all active:scale-125" data-val="1">star</span>
<span class="material-symbols-outlined text-primary cursor-pointer transition-all active:scale-125" data-val="2">star</span>

<span class="material-symbols-outlined">save</span>

        </button>
</footer>
<!-- Bottom Navigation Component (Suppressed as per "Task-Focused" rule but technically part of shell) -->
<!-- NavigationDrawer implementation would go here for menu access, currently hidden for focus -->
<script>
        // Simple micro-interactions for the form
        
        // Star Rating Toggle
        const stars = document.querySelectorAll('#starRating .material-symbols-outlined');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const val = parseInt(star.dataset.val);
                stars.forEach((s, i) => {
                    if (i < val) {
                        s.classList.remove('text-surface-variant');
                        s.classList.add('text-primary');
                        s.style.fontVariationSettings = "'FILL' 1";
                    } else {
                        s.classList.remove('text-primary');
                        s.classList.add('text-surface-variant');
                        s.style.fontVariationSettings = "'FILL' 0";
                    }
                });
            });
        });

        // Toggle Switch Interaction (Visited vs Wishlist)
        const btnVisited = document.getElementById('btnVisited');
        const btnWishlist = document.getElementById('btnWishlist');
        
        const toggleActive = (active, inactive) => {
            active.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
            active.classList.remove('text-on-surface-variant');
            inactive.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
            inactive.classList.add('text-on-surface-variant');
        };

        btnVisited.addEventListener('click', () => toggleActive(btnVisited, btnWishlist));
        btnWishlist.addEventListener('click', () => toggleActive(btnWishlist, btnVisited));

        // Tag Toggle
        const tags = document.querySelectorAll('.flex-wrap span');
        tags.forEach(tag => {
            tag.addEventListener('click', () => {
                tag.classList.toggle('border-primary');
                tag.classList.toggle('text-primary');
                tag.classList.toggle('border-surface-variant');
                tag.classList.toggle('text-on-surface-variant');
            });
        });

        // Form Submission visual feedback
        document.getElementById('newEntryForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> 保存中...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> 已保存';
                btn.classList.replace('bg-primary', 'bg-green-600');
                setTimeout(() => {
                    alert('条目已成功保存到您的 Gourmet Pulse 收藏！');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    btn.classList.replace('bg-green-600', 'bg-primary');
                }, 1000);
            }, 1200);
        });
    </script>
