<script>
        function switchTab(type) {
            const loginBtn = document.getElementById('tab-login');
            const registerBtn = document.getElementById('tab-register');
            const submitText = document.getElementById('submit-text');
            const authForm = document.getElementById('auth-form');

            // Reset classes
            loginBtn.className = "flex-1 pb-4 font-headline-sm text-headline-sm transition-all duration-300";
            registerBtn.className = "flex-1 pb-4 font-headline-sm text-headline-sm transition-all duration-300";

            // Add animation
            authForm.style.opacity = "0";
            authForm.style.transform = "translateY(10px)";

            setTimeout(() => {
                if (type === 'login') {
                    loginBtn.classList.add('text-primary', 'border-b-2', 'border-primary');
                    registerBtn.classList.add('text-on-surface-variant');
                    submitText.innerText = "立即登录";
                } else {
                    registerBtn.classList.add('text-primary', 'border-b-2', 'border-primary');
                    loginBtn.classList.add('text-on-surface-variant');
                    submitText.innerText = "创建账号";
                }
                authForm.style.opacity = "1";
                authForm.style.transform = "translateY(0)";
            }, 200);
        }

        // Add subtle mouse move effect to the login card
        const card = document.querySelector('.login-card');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
