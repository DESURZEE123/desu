<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Top Navigation Bar (Suppressed because it's a focus/transactional screen, using a simple back button instead) -->
<header class="fixed top-0 left-0 w-full px-margin-mobile h-16 flex items-center justify-between z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined text-on-surface" data-icon="close">close</span>
</button>
<div class="font-headline-md text-headline-md text-primary tracking-tight">Gourmet Pulse</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md px-margin-mobile pt-24 pb-12 flex flex-col flex-1">
<!-- Hero Branding/Identity Section -->
<section class="mb-12">
<h1 class="font-headline-xl text-headline-xl mb-2 text-on-surface">欢迎回来</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">发现您的下一场美食盛宴</p>
</section>
<!-- Login Form Section -->
<section class="flex-1">
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant font-semibold ml-1" for="email">电子邮箱</label>
<div class="relative flex items-center form-input-focus border border-surface-variant rounded-xl bg-surface transition-all duration-200">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-transparent border-none rounded-xl focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="email" placeholder="example@gourmet.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant font-semibold ml-1" for="password">密码</label>
<div class="relative flex items-center form-input-focus border border-surface-variant rounded-xl bg-surface transition-all duration-200">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-transparent border-none rounded-xl focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" placeholder="请输入您的密码" type="password"/>
<button class="absolute right-4 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary hover:underline mt-1" href="#">忘记密码？</a>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline-sm text-headline-sm hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-sm mt-4" type="submit">
                    登录
                </button>
</form>
<!-- Secondary Action / Redirect -->
<div class="mt-8 text-center">
<span class="font-body-md text-body-md text-on-surface-variant">还没有账号？</span>
<a class="font-headline-sm text-headline-sm text-primary ml-1 hover:underline" href="#">立即注册</a>
</div>
</section>
<!-- Social Login / Bottom Section -->
<footer class="mt-16">
<div class="relative flex items-center justify-center mb-8">
<div class="absolute w-full h-[1px] bg-surface-variant"></div>
<span class="relative px-4 bg-background font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">或通过以下方式登录</span>
</div>
<div class="flex justify-center gap-gutter">
<!-- Social Buttons -->

</button>

<span class="material-symbols-outlined text-[#1877F2] text-2xl" data-icon="facebook" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
</button>
<button class="w-14 h-14 flex items-center justify-center rounded-xl border border-surface-variant bg-surface hover:bg-surface-container-low transition-all duration-200 active:scale-90">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="apple" style="font-variation-settings: 'FILL' 1;">apps</span>
</button>
</div>
<p class="mt-12 text-center font-body-sm text-body-sm text-outline-variant px-8">
                登录即代表您同意我们的 <a class="underline" href="#">服务条款</a> 和 <a class="underline" href="#">隐私政策</a>
</p>

</div>
<script>
        // Simple Interaction logic for password visibility
        document.querySelector('button[type="button"]').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        });

        // Entrance animation
        window.addEventListener('load', () => {
            document.body.classList.add('opacity-100');
        });
    </script>
