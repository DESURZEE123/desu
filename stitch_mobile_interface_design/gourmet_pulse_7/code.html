<script>
        // Simple interaction for chip selection
        document.querySelectorAll('button[class*="rounded-full"]').forEach(button => {
            button.addEventListener('click', function() {
                const isSelected = this.classList.contains('bg-primary');
                // Reset others if needed (simplified for single selection logic)
                if (!isSelected) {
                    document.querySelectorAll('button[class*="rounded-full"]').forEach(btn => {
                        btn.classList.remove('bg-primary', 'text-on-primary');
                        btn.classList.add('bg-surface-container-low', 'text-on-surface', 'border', 'border-outline-variant');
                    });
                    this.classList.remove('bg-surface-container-low', 'text-on-surface', 'border', 'border-outline-variant');
                    this.classList.add('bg-primary', 'text-on-primary');
                }
            });
        });

        // Micro-interaction for cards
        document.querySelectorAll('.group').forEach(card => {
            card.addEventListener('touchstart', () => {
                card.style.transform = 'scale(0.98)';
            });
            card.addEventListener('touchend', () => {
                card.style.transform = 'scale(1)';
            });
        });
    </script>
